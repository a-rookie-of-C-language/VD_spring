server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/VD?allowPublicKeyRetrieval=TRUE&useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD}
  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 20MB
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
  flyway:
    enabled: true
    baseline-on-migrate: true
  # Mail configuration for alerts
  mail:
    host: ${MAIL_HOST:smtp.163.com}
    port: ${MAIL_PORT:25}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
    default-encoding: UTF-8

# Actuator configuration for metrics
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info,env
  endpoint:
    health:
      show-details: always
  simple:
    metrics:
      export:
        enabled: true

app:
  upload:
    base-path: ${UPLOAD_PATH:uploads}
    cover-path: covers
  security:
    jwt:
      secret: ${JWT_SECRET}
      expiry-minutes: ${JWT_EXPIRY_MINUTES:2400}
  messaging:
    # Disable dev-mode in production
    dev-mode-trigger: false
